<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldorado Pro Panel - Postar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111418;
            --card-bg: #1e2329;
            --primary: #58a6ff;
            --primary-hover: #1f6feb;
            --text-main: #c9d1d9;
            --text-title: #ffffff;
            --text-muted: #8b949e;
            --border-color: #2d333b;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 90px; /* Espaço para o menu fixo */
        }

        /* --- ESTILO DO MENU (NAV) --- */
        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #161b22;
            border-bottom: 1px solid var(--border-color);
            z-index: 9999;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link:hover { color: var(--primary); }
        .nav-link.active { color: #ffffff; border-bottom: 2px solid var(--primary); }

        /* --- ESTILO DO CARD --- */
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        h2 {
            color: var(--text-title);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        label {
            display: block;
            margin: 0 0 8px 0;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group { margin-bottom: 20px; }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .row .input-group { flex: 1; margin-bottom: 0; }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #0d1117;
            color: var(--text-main);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .file-drop-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .file-drop-area:hover {
            border-color: var(--primary);
            background: rgba(88, 166, 255, 0.05);
        }

        .file-msg {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .file-input {
            position: absolute;
            left: 0; top: 0; height: 100%; width: 100%;
            cursor: pointer;
            opacity: 0;
        }

        button#btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button#btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button#btn:disabled {
            background: #21262d;
            color: #484f58;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>

<body>
    <nav class="main-nav">
        <a href="/" class="nav-link" id="nav-postar">🚀 Postar Pet</a>
        <a href="/meus_pets.html" class="nav-link" id="nav-espionar">🕵️ Espionar Rivais</a>
    </nav>

    <div class="card">
        <h2>Criar Anúncio</h2>
        <form id="offerForm">
            <div class="input-group">
                <label>Nome do Brainrot</label>
                <input type="text" id="itemName" placeholder="Ex: Los Matteos" required autocomplete="off">
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Valor M/S</label>
                    <input type="text" id="gameValue" placeholder="Ex: 265.6" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Venda (USD)</label>
                    <input type="text" id="price" placeholder="5.50" required autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label>Mutação</label>
                <select id="mutationId">
                    <option value="none">⚪ None</option>
                    <option value="cursed">💀 Cursed</option>
                    <option value="divine">✨ Divine</option>
                    <option value="gold">🟡 Gold</option>
                    <option value="diamond">💎 Diamond</option>
                    <option value="bloodrot">🩸 Bloodroot</option>
                    <option value="candy">🍬 Candy</option>
                    <option value="lava">🌋 Lava</option>
                    <option value="galaxy">🌌 Galaxy</option>
                    <option value="yin-yang">☯️ Yin Yang</option>
                    <option value="radioactive">☢️ Radioactive</option>
                    <option value="rainbow">🌈 Rainbow</option>
                    <option value="cyber">🤖 Cyber</option>
                </select>
            </div>

            <div class="input-group" style="margin-bottom: 5px;">
                <label>Imagem do Anúncio</label>
                <div class="file-drop-area" id="dropArea">
                    <span class="file-msg" id="fileMsg">Arraste a foto ou clique aqui</span>
                    <input class="file-input" type="file" id="imageFile" accept="image/png, image/jpeg, image/webp" required>
                </div>
            </div>

            <button type="submit" id="btn">Publicar na Eldorado</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const form = document.getElementById('offerForm');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const fileInput = document.getElementById('imageFile');
        const fileMsg = document.getElementById('fileMsg');
        const dropArea = document.getElementById('dropArea');

        // Marcar link ativo no menu
        const path = window.location.pathname;
        if (path === '/' || path.includes('index.html')) document.getElementById('nav-postar').classList.add('active');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileMsg.textContent = "✅ " + fileInput.files[0].name;
                fileMsg.style.color = "var(--primary)";
            }
        });

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            status.style.display = 'block';
            status.style.backgroundColor = '#161b22';
            status.innerHTML = "⏳ Fazendo upload...";

            const payloadData = new FormData();
            payloadData.append('itemName', document.getElementById('itemName').value);
            payloadData.append('gameValueInput', document.getElementById('gameValue').value);
            payloadData.append('mutationId', document.getElementById('mutationId').value);
            payloadData.append('priceInput', document.getElementById('price').value);
            payloadData.append('imageFile', fileInput.files[0]);

            try {
                const res = await fetch('/api/create-offer', { method: 'POST', body: payloadData });
                const data = await res.json();

                if (data.success) {
                    status.innerHTML = "✅ Anúncio Criado!";
                    status.style.color = "var(--success)";
                    form.reset();
                    fileMsg.textContent = "Arraste a foto ou clique aqui";
                } else {
                    status.innerHTML = "❌ " + data.message;
                    status.style.color = "var(--error)";
                }
            } catch (err) {
                status.innerHTML = "❌ Erro de conexão local.";
                status.style.color = "var(--error)";
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
