<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eldorado Pro Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 420px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 { 
            color: var(--primary); 
            text-align: center; 
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        label { 
            display: block; 
            margin: 0 0 8px 0; 
            font-size: 13px; 
            color: var(--text-muted); 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        /* Colocando os campos lado a lado */
        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .row .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        input[type="text"], select { 
            width: 100%; 
            padding: 12px 14px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-size: 15px; 
            font-family: 'Inter', sans-serif;
            box-sizing: border-box; 
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        
        .file-drop-area { 
            border: 2px dashed var(--border-color); 
            border-radius: 8px; 
            padding: 25px 20px; 
            text-align: center; 
            background: rgba(15, 23, 42, 0.5); 
            cursor: pointer; 
            transition: all 0.3s ease; 
            position: relative; 
        }
        
        .file-drop-area:hover, .file-drop-area.dragover { 
            border-color: var(--primary); 
            background: rgba(14, 165, 233, 0.05); 
        }
        
        .file-msg { color: var(--text-muted); font-size: 14px; pointer-events: none; font-weight: 500;}
        .file-input { position: absolute; left: 0; top: 0; height: 100%; width: 100%; cursor: pointer; opacity: 0; }

        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 10px; 
            border: none; 
            border-radius: 8px; 
            background: var(--primary); 
            color: white; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled { 
            background: var(--border-color); 
            color: var(--text-muted); 
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #status { 
            margin-top: 20px; 
            text-align: center; 
            font-size: 14px; 
            font-weight: 600; 
            padding: 12px; 
            border-radius: 8px; 
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Criar Anúncio</h2>
        <form id="offerForm">
            <div class="input-group">
                <label>Nome do Brainrot</label>
                <input type="text" id="itemName" placeholder="Ex: Los Matteos" required autocomplete="off">
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Valor M/S</label>
                    <input type="text" id="gameValue" placeholder="Ex: 265.6" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Venda (USD)</label>
                    <input type="text" id="price" placeholder="5.50" required autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label>Mutação</label>
                <select id="mutationId">
                    <option value="none">⚪ None</option>
                    <option value="cursed">💀 Cursed</option>
                    <option value="divine">✨ Divine</option>
                    <option value="gold">🟡 Gold</option>
                    <option value="diamond">💎 Diamond</option>
                    <option value="bloodrot">🩸 Bloodroot</option>
                    <option value="candy">🍬 Candy</option>
                    <option value="lava">🌋 Lava</option>
                    <option value="galaxy">🌌 Galaxy</option>
                    <option value="yin-yang">☯️ Yin Yang</option>
                    <option value="radioactive">☢️ Radioactive</option>
                    <option value="rainbow">🌈 Rainbow</option>
                    <option value="cyber">🤖 Cyber</option>
                </select>
            </div>

            <div class="input-group" style="margin-bottom: 5px;">
                <label>Imagem do Anúncio</label>
                <div class="file-drop-area" id="dropArea">
                    <span class="file-msg" id="fileMsg">Arraste a foto ou clique aqui</span>
                    <input class="file-input" type="file" id="imageFile" accept="image/png, image/jpeg, image/webp" required>
                </div>
            </div>

            <button type="submit" id="btn">Publicar na Eldorado</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const form = document.getElementById('offerForm');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const fileInput = document.getElementById('imageFile');
        const fileMsg = document.getElementById('fileMsg');
        const dropArea = document.getElementById('dropArea');

        fileInput.addEventListener('dragenter', () => dropArea.classList.add('dragover'));
        fileInput.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
        fileInput.addEventListener('drop', () => dropArea.classList.remove('dragover'));

        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) {
                fileMsg.textContent = "✅ " + fileInput.files[0].name;
                fileMsg.style.color = "var(--primary)";
            } else {
                fileMsg.textContent = "Arraste a foto ou clique aqui";
                fileMsg.style.color = "var(--text-muted)";
            }
        });

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            
            status.style.display = 'block';
            status.style.backgroundColor = 'var(--bg-color)';
            status.style.color = 'var(--text-main)';
            status.style.border = '1px solid var(--border-color)';
            status.innerHTML = "⏳ Processando e fazendo upload...";

            const payloadData = new FormData();
            payloadData.append('itemName', document.getElementById('itemName').value);
            payloadData.append('gameValueInput', document.getElementById('gameValue').value);
            payloadData.append('mutationId', document.getElementById('mutationId').value);
            payloadData.append('priceInput', document.getElementById('price').value);
            payloadData.append('imageFile', fileInput.files[0]);

            try {
                const res = await fetch('/api/create-offer', { method: 'POST', body: payloadData });
                const data = await res.json();
                
                if(data.success) {
                    status.innerHTML = "✅ " + data.message;
                    status.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                    status.style.color = "var(--success)";
                    status.style.border = '1px solid rgba(16, 185, 129, 0.3)';
                    
                    form.reset(); 
                    fileMsg.textContent = "Arraste a foto ou clique aqui"; 
                    fileMsg.style.color = "var(--text-muted)";
                } else {
                    status.innerHTML = "❌ " + data.message;
                    status.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                    status.style.color = "var(--error)";
                    status.style.border = '1px solid rgba(239, 68, 68, 0.3)';
                }
            } catch (err) {
                status.innerHTML = "❌ Erro na conexão com o servidor local.";
                status.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                status.style.color = "var(--error)";
                status.style.border = '1px solid rgba(239, 68, 68, 0.3)';
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
